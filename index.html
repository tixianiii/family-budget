<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>家庭記帳本</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="家庭記帳">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.4/lunar.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #F8F7F4; }
  ::-webkit-scrollbar { display: none; }
  @keyframes fadeIn { from { opacity:0; transform:translateX(-50%) translateY(-8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<div id="root">
  <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #1a1a1a; font-family: 'Noto Sans TC', sans-serif;">
    <div style="font-size: 72px; margin-bottom: 20px; animation: slideUp 0.5s ease;">📒</div>
    <div style="color: #F59E0B; font-size: 28px; font-weight: 900; letter-spacing: 4px; animation: fadeIn 0.8s ease;">家庭記帳本</div>
    <div style="color: #9CA3AF; font-size: 16px; font-weight: 700; margin-top: 16px; animation: fadeIn 1.2s ease;">正在載入資料，請稍候...</div>
  </div>
</div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { PieChart, Pie, Cell, Tooltip, ResponsiveContainer, Legend } = Recharts;

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyv5ROh9LiMjcDsfdp4u1pmpxKgCX0O9yJL02Bv2XC-SzDNwxbTKjK4XRh9SIOIyAtk/exec";

const MEMBERS = [
  { id: "dad", label: "騏騏", emoji: "👨", color: "#3B82F6" },
  { id: "mom", label: "潔潔", emoji: "👩", color: "#EC4899" },
  { id: "sister", label: "嫻嫻", emoji: "👧", color: "#8B5CF6" },
  { id: "brother", label: "澤澤", emoji: "🧒", color: "#10B981", image: "zeze.png" },
  { id: "whole_family", label: "全家", emoji: "👨‍👩‍👧‍👦", color: "#F59E0B" },
];

const CATEGORIES = [
  { id: "food", label: "飲食", emoji: "🍱", color: "#F59E0B", subs: ["早餐","午餐","晚餐","飲料","點心","宵夜","酒","水果","保健品","其他"] },
  { id: "transport", label: "交通", emoji: "🚗", color: "#3B82F6", subs: ["公車","捷運","計程車","停車費","加油","高鐵","汽車","火車","摩托車"] },
  { id: "entertainment", label: "娛樂", emoji: "🎮", color: "#8B5CF6", subs: ["電影","遊戲","KTV","展覽","運動","訂閱","休閒","旅行","住宿","派對","演唱會"] },
  { id: "company", label: "公司", emoji: "💼", color: "#6B7280", subs: [] },
  { id: "shopping", label: "購物", emoji: "🛍️", color: "#EC4899", subs: ["衣服","鞋子","包包","3C","書籍","生活用品","美妝保養","精品","禮物","網購","美容美髮"] },
  { id: "personal", label: "個人", emoji: "💆", color: "#06B6D4", subs: ["社交","通話費","投資","稅金","保險","捐款","彩券","卡費"] },
  { id: "medical", label: "醫療", emoji: "🏥", color: "#EF4444", subs: ["掛號費","藥費","醫療用品","打針","住院","手術","健康檢查"] },
  { id: "family", label: "居家", emoji: "🏠", color: "#F97316", subs: ["房租","網路費","電話費","日常用品","水費","電費","燃料費","洗衣費","修繕費","家具","家電","西螺家"] },
  { id: "education", label: "學習", emoji: "📚", color: "#10B981", subs: ["學費","補習班","課程","文具","書本"] },
  { id: "other", label: "其他", emoji: "📌", color: "#9CA3AF", subs: [] },
];

const getCatById = (label) => CATEGORIES.find(c => c.label === label) || CATEGORIES[CATEGORIES.length - 1];
const cleanDate = (str) => { if (!str) return ""; const d = new Date(str); return isNaN(d.getTime()) ? String(str).split("T")[0] : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const today = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const formatDate = (str) => { const clean = cleanDate(str); const parts = clean.split("-"); return parts.length !== 3 ? clean : `${parts[0]}年${parts[1]}月${parts[2]}日`; };
const formatMoney = (n) => `$${Number(n).toLocaleString()}`;

function Card({ children, style }) { return <div style={{ background:"#fff", borderRadius:16, padding:24, marginBottom:16, boxShadow:"0 1px 8px rgba(0,0,0,0.06)", ...style }}>{children}</div>; }
function SectionLabel({ children }) { return <div style={{ fontSize:14, fontWeight:900, color:"#9CA3AF", letterSpacing:1.5, marginBottom:12 }}>{children}</div>; }

function CalendarPicker({ date, setDate, records, selYear, selMonth, setSelYear, setSelMonth }) {
  const daysInMonth = new Date(selYear, selMonth, 0).getDate();
  const firstDay = new Date(selYear, selMonth - 1, 1).getDay();
  const dailyTotals = {};
  records.forEach(r => { const d = cleanDate(r.date); dailyTotals[d] = (dailyTotals[d] || 0) + r.amount; });
  const handlePrevMonth = () => { let newY = selYear, newM = selMonth - 1; if (newM === 0) { newY -= 1; newM = 12; } setSelYear(newY); setSelMonth(newM); setDate(`${newY}-${String(newM).padStart(2,'0')}-01`); };
  const handleNextMonth = () => { let newY = selYear, newM = selMonth + 1; if (newM === 13) { newY += 1; newM = 1; } setSelYear(newY); setSelMonth(newM); setDate(`${newY}-${String(newM).padStart(2,'0')}-01`); };
  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let i = 1; i <= daysInMonth; i++) days.push(i);
  const todayStr = today();
  return (
    <Card style={{ padding: "18px 16px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: 16 }}>
        <button onClick={handlePrevMonth} style={{ width:40, height:40, background:"#F9FAFB", border:"none", borderRadius:12, fontSize: 24, cursor:"pointer", color:"#374151", fontWeight:900 }}>‹</button>
        <div style={{ fontSize: 22, fontWeight: 900, color:"#1a1a1a", letterSpacing: 2 }}>{selYear}年{selMonth}月</div>
        <button onClick={handleNextMonth} style={{ width:40, height:40, background:"#F9FAFB", border:"none", borderRadius:12, fontSize: 24, cursor:"pointer", color:"#374151", fontWeight:900 }}>›</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", textAlign: "center", color: "#9CA3AF", fontSize: 14, fontWeight: 900, marginBottom: 12 }}>
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
        {days.map((day, idx) => {
          if (!day) return <div key={`empty-${idx}`} />;
          const currentCellDateStr = `${selYear}-${String(selMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const isSelected = date === currentCellDateStr;
          const isToday = todayStr === currentCellDateStr;
          const total = dailyTotals[currentCellDateStr] || 0;
          let lunarText = "";
          if (typeof Solar !== 'undefined') { try { lunarText = Solar.fromYmd(selYear, selMonth, day).getLunar().getDayInChinese(); } catch (e) {} }
          return (
            <div key={day} onClick={() => setDate(currentCellDateStr)}
              style={{
                height: 72, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", borderRadius: 14, cursor: "pointer",
                background: isSelected ? "#F59E0B" : total > 0 ? "#FEE2E2" : "transparent",
                color: isSelected ? "#fff" : "#1a1a1a", border: isToday && !isSelected ? "2px solid #F59E0B" : "2px solid transparent", transition: "all 0.15s"
              }}>
              <div style={{ fontSize: 18, fontWeight: 900, lineHeight: 1.1 }}>{isToday ? "今" : day}</div>
              {lunarText && <div style={{ fontSize: 11, fontWeight: 700, color: isSelected ? "rgba(255,255,255,0.9)" : "#9CA3AF", marginTop: 3 }}>{lunarText}</div>}
              {total > 0 && <div style={{ fontSize: 11, fontWeight: 900, color: isSelected ? "#FFFBEB" : "#EF4444", marginTop: 3 }}>-{total}</div>}
            </div>
          );
        })}
      </div>
    </Card>
  );
}

function App() {
  const [tab, setTab] = useState(0);
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selYear, setSelYear] = useState(new Date().getFullYear());
  const [selMonth, setSelMonth] = useState(new Date().getMonth() + 1);
  const [date, setDate] = useState(today());
  const [selectedMembers, setSelectedMembers] = useState([]);
  const [category, setCategory] = useState(null);
  const [subCategory, setSubCategory] = useState(null);
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [toast, setToast] = useState(null);
  
  // 🌟 搜尋功能的 State
  const [searchQuery, setSearchQuery] = useState("");

  const showToast = useCallback((msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); }, []);
  
  const fetchRecords = useCallback(async (year, month) => {
    const targetMonth = `${year}_${String(month).padStart(2, '0')}`;
    const cacheKey = `cache_${targetMonth}`;
    const cachedData = localStorage.getItem(cacheKey);
    if (cachedData) { try { setRecords(JSON.parse(cachedData)); setLoading(false); } catch(e) {} } else { setLoading(true); }
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?month=${targetMonth}`);
      const data = await res.json();
      if (data.status === "ok") {
        const enriched = data.records.map(r => {
          const cat = getCatById(r.categoryLabel);
          const memberNames = String(r.member || "").split(/[、,]/).map(name => name.trim()).filter(n => n);
          const memObjs = memberNames.map(name => MEMBERS.find(m => m.label === name) || MEMBERS[0]);
          return { ...r, date: cleanDate(r.date), category: cat.id, categoryEmoji: cat.emoji, categoryColor: cat.color, memberObjs: memObjs };
        });
        enriched.sort((a,b) => new Date(b.date) - new Date(a.date));
        setRecords(enriched);
        localStorage.setItem(cacheKey, JSON.stringify(enriched));
      }
    } catch (err) { if (!cachedData) showToast(`連線失敗`, "error"); } finally { setLoading(false); }
  }, [showToast]);

  useEffect(() => { fetchRecords(selYear, selMonth); }, [selYear, selMonth, fetchRecords]);
  useEffect(() => { if (date) { const [y, m] = date.split("-"); setSelYear(Number(y)); setSelMonth(Number(m)); } }, [date]);

  useEffect(() => {
    let startY = 0; let currentY = 0; let isAtTop = false;
    const handleTouchStart = (e) => { if (window.scrollY <= 0) { startY = e.touches[0].clientY; currentY = startY; isAtTop = true; } else { isAtTop = false; } };
    const handleTouchMove = (e) => { if (isAtTop) currentY = e.touches[0].clientY; };
    const handleTouchEnd = () => { if (isAtTop && (currentY - startY > 100)) { showToast("🔄 重新載入最新資料..."); setTimeout(() => window.location.reload(), 300); } startY = 0; currentY = 0; isAtTop = false; };
    window.addEventListener('touchstart', handleTouchStart, { passive: true });
    window.addEventListener('touchmove', handleTouchMove, { passive: true });
    window.addEventListener('touchend', handleTouchEnd, { passive: true });
    return () => { window.removeEventListener('touchstart', handleTouchStart); window.removeEventListener('touchmove', handleTouchMove); window.removeEventListener('touchend', handleTouchEnd); };
  }, [showToast]);

  const toggleMember = (m) => {
    setSelectedMembers(prev => {
      if (m.id === "whole_family") return [m];
      const filtered = prev.filter(p => p.id !== "whole_family");
      if (prev.some(p => p.id === m.id)) { return filtered.filter(p => p.id !== m.id); } 
      else { return [...filtered, m]; }
    });
  };

  const handleSubmit = async () => {
    if (selectedMembers.length === 0 || !category || !amount) return showToast("資料不完整哦", "error");
    let calcAmt = 0; 
    try { calcAmt = Function(`"use strict"; return (${String(amount).replace(/[^-()\d/*+.]/g, '')})`)(); } 
    catch(e) { return showToast("算式錯誤", "error"); }
    if (!calcAmt || isNaN(calcAmt) || calcAmt <= 0) return showToast("無效金額", "error");
    
    const memberLabels = selectedMembers.map(m => m.label).join("、");
    const fakeId = String(Date.now());
    
    const newRecord = {
      id: fakeId, date: date, amount: calcAmt, note: note || "", member: memberLabels,
      category: category.id, categoryLabel: category.label, categoryEmoji: category.emoji, categoryColor: category.color,
      subCategory: subCategory || "", memberObjs: [...selectedMembers]
    };
    
    setRecords(prev => [newRecord, ...prev].sort((a,b) => new Date(b.date) - new Date(a.date)));
    showToast("✅ 記帳成功！"); 
    setSelectedMembers([]); setCategory(null); setSubCategory(null); setAmount(""); setNote("");
    
    const p = new URLSearchParams({ action: "write", id: fakeId, date: date, member: memberLabels, categoryLabel: category.label, subCategory: subCategory || "", amount: String(calcAmt), note: note ? "'" + note : "" });
    fetch(`${APPS_SCRIPT_URL}?${p.toString()}`).then(res => res.json()).then(data => {
      if(data.status !== "ok") { showToast("❌ 背景同步異常", "error"); }
    }).catch(err => { showToast("❌ 網路異常，背景同步失敗", "error"); });
  };

  const handleDelete = async (id, rDate) => {
    setRecords(prev => prev.filter(r => r.id !== id));
    showToast("🗑 已刪除");
    const p = new URLSearchParams({ action: "delete", id: String(id), date: rDate });
    fetch(`${APPS_SCRIPT_URL}?${p.toString()}`).catch(() => showToast("❌ 背景刪除失敗", "error"));
  };

  const handleUpdate = async (record, nAmt, nNote) => {
    let calcAmt = 0; 
    try { calcAmt = Function(`"use strict"; return (${String(nAmt).replace(/[^-()\d/*+.]/g, '')})`)(); } 
    catch(e) { return showToast("算式錯誤", "error"); }
    if (!calcAmt || isNaN(calcAmt) || calcAmt <= 0) return showToast("無效金額", "error");
    
    setRecords(prev => prev.map(r => r.id === record.id ? { ...r, amount: calcAmt, note: nNote || "" } : r));
    showToast("✅ 修改成功！");
    
    try {
      fetch(`${APPS_SCRIPT_URL}?${new URLSearchParams({ action: "delete", id: String(record.id), date: record.date }).toString()}`).then(() => {
        fetch(`${APPS_SCRIPT_URL}?${new URLSearchParams({ action: "write", id: String(record.id), date: record.date, member: String(record.member), categoryLabel: record.categoryLabel, subCategory: record.subCategory || "", amount: String(calcAmt), note: nNote ? "'" + nNote : "" }).toString()}`);
      });
    } catch(err) { showToast("❌ 背景修改失敗", "error"); }
  };

  // 🌟 一鍵複製邏輯
  const handleDuplicate = (r) => {
    const cat = CATEGORIES.find(c => c.id === r.category);
    setCategory(cat);
    setSubCategory(r.subCategory);
    setAmount(String(r.amount));
    setNote(r.note ? r.note.replace(/^'/, '') : ""); // 去掉開頭的防呆單引號
    setSelectedMembers(r.memberObjs || []);
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
    showToast("💡 已複製內容，可直接修改或新增");
  };

  const selectedDateTotal = records.filter(r => cleanDate(r.date) === date).reduce((s, r) => s + r.amount, 0);

  return (
    <div style={{ fontFamily:"'Noto Sans TC',sans-serif", minHeight:"100vh", background:"#F8F7F4" }}>
      {toast && <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", background: toast.type === "error" ? "#EF4444" : "#1a1a1a", color:"#fff", padding:"12px 28px", borderRadius:99, zIndex:9999, fontSize:16, fontWeight:700, boxShadow:"0 4px 24px rgba(0,0,0,0.18)", animation:"fadeIn 0.2s ease", whiteSpace:"nowrap", maxWidth:"90vw" }}>{toast.msg}</div>}
      <div style={{ background:"#1a1a1a", padding:"20px 20px 0", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ maxWidth:480, margin:"0 auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div><div style={{ color:"#F59E0B", fontSize:13, fontWeight:700, letterSpacing:3, textTransform:"uppercase" }}>家庭共享</div><div style={{ color:"#fff", fontSize:26, fontWeight:900, marginTop:2 }}>記帳本</div></div>
              <button onClick={() => window.location.reload()} style={{ background:"none", border:"none", fontSize:24, cursor:"pointer", padding:5, opacity:0.8 }}>🔄</button>
              {tab === 0 && <div style={{ marginLeft: 4, padding: "6px 12px", background: "#333", borderRadius: 12, border: "1px solid #444", animation: "fadeIn 0.3s ease" }}><div style={{ color: "#9CA3AF", fontSize: 12, fontWeight: 700, marginBottom: 2 }}>本日總計</div><div style={{ color: "#F59E0B", fontSize: 18, fontWeight: 900 }}>{formatMoney(selectedDateTotal)}</div></div>}
            </div>
            <div style={{ textAlign:"right" }}><div style={{ color:"#9CA3AF", fontSize:13, fontWeight:600 }}>{selMonth}月總計</div><div style={{ color:"#F59E0B", fontSize:24, fontWeight:900 }}>{formatMoney(records.reduce((s, r) => s + r.amount, 0))}</div></div>
          </div>
          <div style={{ display:"flex", gap:4 }}>{["記帳","報表"].map((t,i) => (<button key={t} onClick={() => setTab(i)} style={{ flex:1, padding:"12px 0", border:"none", background:"transparent", color: tab===i ? "#F59E0B" : "#6B7280", fontWeight:700, fontSize:18, cursor:"pointer", borderBottom:`4px solid ${tab===i ? "#F59E0B" : "transparent"}`, transition:"all 0.2s" }}>{t}</button>))}</div>
        </div>
      </div>
      <div style={{ maxWidth:480, margin:"0 auto", padding:"20px 16px 80px" }}>
        {tab === 0 ? <FormView date={date} setDate={setDate} selectedMembers={selectedMembers} onMemberToggle={toggleMember} category={category} onCategorySelect={c => {setCategory(c); setSubCategory(null);}} subCategory={subCategory} setSubCategory={setSubCategory} amount={amount} setAmount={setAmount} note={note} setNote={setNote} onSubmit={handleSubmit} records={records} selYear={selYear} setSelYear={setSelYear} selMonth={selMonth} setSelMonth={setSelMonth} onDelete={handleDelete} onUpdate={handleUpdate} onDuplicate={handleDuplicate} loading={loading} searchQuery={searchQuery} setSearchQuery={setSearchQuery} /> : <DashboardView records={records} loading={loading} selYear={selYear} setSelYear={setSelYear} selMonth={selMonth} setSelMonth={setSelMonth} />}
      </div>
    </div>
  );
}

function FormView({ date, setDate, selectedMembers, onMemberToggle, category, onCategorySelect, subCategory, setSubCategory, amount, setAmount, note, setNote, onSubmit, records, selYear, setSelYear, selMonth, setSelMonth, onDelete, onUpdate, onDuplicate, loading, searchQuery, setSearchQuery }) {
  const catObj = CATEGORIES.find(c => c.id === category?.id);
  const [confirmId, setConfirmId] = useState(null);
  const [editId, setEditId] = useState(null);
  const [editAmt, setEditAmt] = useState("");
  const [editNote, setEditNote] = useState("");
  const [showKeypad, setShowKeypad] = useState(false);
  const keypadRef = useRef(null);
  useEffect(() => { if (showKeypad && keypadRef.current) setTimeout(() => keypadRef.current.scrollIntoView({ behavior: "smooth", block: "end" }), 150); }, [showKeypad]);

  // 🌟 搜尋過濾邏輯 (如果搜尋框有字，就在全月的資料裡面找)
  const displayRecords = searchQuery.trim() 
    ? records.filter(r => 
        (r.note || "").toLowerCase().includes(searchQuery.toLowerCase()) || 
        r.categoryLabel.includes(searchQuery) || 
        (r.subCategory || "").includes(searchQuery) || 
        String(r.member).includes(searchQuery)
      )
    : records.filter(r => cleanDate(r.date) === date);

  return (
    <>
      <CalendarPicker date={date} setDate={setDate} records={records} selYear={selYear} setSelYear={setSelYear} selMonth={selMonth} setSelMonth={setSelMonth} />
      
      <Card>
        <SectionLabel>👤 成員 (可複選)</SectionLabel>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
          {MEMBERS.map(m => {
            const isSelected = selectedMembers.some(p => p.id === m.id);
            return (
              <button key={m.id} onClick={() => onMemberToggle(m)} style={{ padding:"14px 4px", border:`2px solid ${isSelected ? m.color : "#F3F4F6"}`, borderRadius:14, background: isSelected ? m.color+"18" : "#F9FAFB", cursor:"pointer", textAlign:"center", transition:"all 0.15s" }}>
                <div style={{ fontSize:28, filter: isSelected ? "none" : "grayscale(1) opacity(0.5)" }}>{m.emoji}</div>
                <div style={{ fontSize:15, fontWeight:700, color: isSelected ? m.color : "#9CA3AF", marginTop:6 }}>{m.label}</div>
              </button>
            );
          })}
        </div>
      </Card>
      
      <Card>
        <SectionLabel>🗂 主類別</SectionLabel>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6 }}>{CATEGORIES.map(cat => (<button key={cat.id} onClick={() => onCategorySelect(cat)} style={{ padding:"12px 4px", border:`2px solid ${category?.id===cat.id ? cat.color : "#F3F4F6"}`, borderRadius:14, background: category?.id===cat.id ? cat.color+"18" : "#F9FAFB", cursor:"pointer", textAlign:"center", transition:"all 0.15s" }}><div style={{ fontSize:26 }}>{cat.emoji}</div><div style={{ fontSize:14, fontWeight:700, color: category?.id===cat.id ? cat.color : "#6B7280", marginTop:4 }}>{cat.label}</div></button>))}</div>
        {catObj && catObj.subs.length > 0 && (<div style={{ marginTop:16, animation:"slideUp 0.2s ease" }}><SectionLabel>📎 子類別</SectionLabel><div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>{catObj.subs.map(sub => (<button key={sub} onClick={() => setSubCategory(sub)} style={{ padding:"8px 16px", border:`2px solid ${subCategory===sub ? catObj.color : "#E5E7EB"}`, borderRadius:99, background: subCategory===sub ? catObj.color : "#fff", color: subCategory===sub ? "#fff" : "#374151", fontSize:15, fontWeight:700, transition:"all 0.15s" }}>{sub}</button>))}</div></div>)}
      </Card>
      
      <Card>
        <SectionLabel>💰 金額 (點擊開啟計算機)</SectionLabel>
        <div style={{ position:"relative" }}>
          <span style={{ position:"absolute", left:16, top:"50%", transform:"translateY(-50%)", fontSize:28, color:"#9CA3AF", fontWeight:900 }}>$</span>
          <input type="text" inputMode="none" readOnly value={amount} onClick={() => setShowKeypad(true)} placeholder="0" style={{ width:"100%", fontSize: String(amount).length > 14 ? 22 : String(amount).length > 9 ? 32 : 42, fontWeight:900, border:"2px solid #F3F4F6", borderRadius:12, padding:"16px 16px 16px 48px", color: showKeypad ? "#F59E0B" : "#1a1a1a", background: showKeypad ? "#FFFBEB" : "#F9FAFB", outline:"none", cursor:"pointer", transition:"font-size 0.2s ease, background 0.2s ease", textOverflow: "ellipsis", overflowX: "auto" }} />
        </div>
        {showKeypad && (<div ref={keypadRef} style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginTop: 18, animation: "slideUp 0.2s ease" }}>{[{ l: '7', v: '7' }, { l: '8', v: '8' }, { l: '9', v: '9' }, { l: '⌫', v: 'BACK', bg: '#FEE2E2', c: '#EF4444' },{ l: '4', v: '4' }, { l: '5', v: '5' }, { l: '6', v: '6' }, { l: '＋', v: '+', bg: '#FEF3C7', c: '#F59E0B' },{ l: '1', v: '1' }, { l: '2', v: '2' }, { l: '3', v: '3' }, { l: '－', v: '-', bg: '#FEF3C7', c: '#F59E0B' },{ l: 'C', v: 'CLEAR', bg: '#F3F4F6', c: '#6B7280' }, { l: '0', v: '0' }, { l: '×', v: '*', bg: '#FEF3C7', c: '#F59E0B' }, { l: '÷', v: '/', bg: '#FEF3C7', c: '#F59E0B' }].map(k => (<button key={k.l} type="button" onClick={(e) => { e.preventDefault(); if (k.v === 'BACK') setAmount(prev => String(prev).slice(0, -1)); else if (k.v === 'CLEAR') setAmount(""); else setAmount(prev => String(prev) + k.v); }} style={{ padding: "16px 0", fontSize: 26, fontWeight: 900, borderRadius: 14, border: "none", background: k.bg || '#fff', color: k.c || '#1a1a1a', boxShadow: "0 2px 6px rgba(0,0,0,0.06)", cursor: "pointer", fontFamily: "inherit" }}>{k.l}</button>))}<button type="button" onClick={(e) => { e.preventDefault(); setShowKeypad(false); }} style={{ gridColumn: "span 4", padding: "16px 0", fontSize: 18, fontWeight: 900, borderRadius: 14, border: "none", background: '#1a1a1a', color: '#fff', boxShadow: "0 4px 12px rgba(0,0,0,0.15)", cursor: "pointer", fontFamily: "inherit", marginTop: 6, letterSpacing:2 }}>完成</button></div>)}
        <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="備註（選填）⋯" rows={2} style={{ width:"100%", marginTop:16, fontSize:16, fontWeight:500, border:"2px solid #F3F4F6", borderRadius:12, padding:"14px 16px", color:"#374151", background:"#F9FAFB", outline:"none", resize:"none", lineHeight:1.6 }} />
        {(() => {
          if (!note.trim()) return null;
          const counts = {};
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith('cache_')) { try { JSON.parse(localStorage.getItem(key)).forEach(r => { if (r.note && r.note.trim()) { const n = r.note.trim(); counts[n] = (counts[n] || 0) + 1; } }); } catch(e) {} }
          }
          const suggs = Object.keys(counts).filter(n => n.toLowerCase().includes(note.toLowerCase()) && n !== note).sort((a,b) => counts[b] - counts[a]).slice(0, 3);
          if (suggs.length === 0) return null;
          return (<div style={{ display:"flex", gap:10, marginTop:12, flexWrap:"wrap", animation:"slideUp 0.2s ease" }}><span style={{ fontSize:14, color:"#9CA3AF", display:"flex", alignItems:"center", fontWeight:700 }}>💡 猜你想輸入：</span>{suggs.map(s => (<button key={s} onClick={() => setNote(s)} style={{ padding:"6px 14px", background:"#F3F4F6", color:"#374151", border:"1px solid #E5E7EB", borderRadius:99, fontSize:15, fontWeight:700, cursor:"pointer" }}>{s}</button>))}</div>);
        })()}
      </Card>
      <button onClick={onSubmit} style={{ width:"100%", padding:"20px 0", background:"#1a1a1a", color:"#F59E0B", border:"none", borderRadius:16, fontSize:22, fontWeight:900, cursor:"pointer", letterSpacing:4, boxShadow:"0 4px 20px rgba(0,0,0,0.15)" }}>＋ 新增支出</button>
      
      <div style={{ marginTop:30 }}>
        
        {/* 🌟 新增的搜尋框 */}
        <div style={{ position: "relative", marginBottom: 20 }}>
          <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", fontSize: 16 }}>🔍</span>
          <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="搜尋全月紀錄 (備註、類別或成員)..." style={{ width: "100%", padding: "12px 16px 12px 40px", borderRadius: 99, border: "2px solid #E5E7EB", background: "#fff", outline: "none", fontSize: 15, fontWeight: 500, color: "#374151" }} />
          {searchQuery && (<button onClick={() => setSearchQuery("")} style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#9CA3AF", fontSize: 16, cursor: "pointer", fontWeight: 900 }}>✕</button>)}
        </div>

        {/* 🌟 動態標題：顯示是哪天的紀錄，或是搜尋的總計 */}
        <SectionLabel>
          {searchQuery.trim() ? `🔍 搜尋 "${searchQuery}" 的結果` : `🕐 ${formatDate(date)} 記錄`}
        </SectionLabel>
        
        {searchQuery.trim() && displayRecords.length > 0 && (
          <div style={{ marginBottom: 12, color: "#F59E0B", fontWeight: 900, fontSize: 15, background: "#FEF3C7", padding: "8px 12px", borderRadius: 8, display: "inline-block" }}>
            合計：{formatMoney(displayRecords.reduce((s, r) => s + r.amount, 0))} (共 {displayRecords.length} 筆)
          </div>
        )}

        {loading ? <div style={{ textAlign:"center", padding:"30px", color:"#9CA3AF", fontWeight:900, fontSize:18 }}>⏳ 同步資料中...</div> : 
          displayRecords.length === 0 ? <div style={{ textAlign:"center", padding:"30px", color:"#9CA3AF", fontWeight:700, fontSize:16, background:"#fff", borderRadius:16, border:"2px dashed #E5E7EB" }}>{searchQuery.trim() ? "找不到相關紀錄 🥺" : "這天沒有花錢喔！🎉"}</div> : 
          displayRecords.map(r => (
            <div key={r.id} style={{ background:"#fff", borderRadius:16, padding:"14px 16px", marginBottom:10, boxShadow:"0 2px 8px rgba(0,0,0,0.05)", borderLeft:`6px solid ${r.categoryColor}` }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:40, height:40, borderRadius:12, background:(r.categoryColor||"#ccc")+"22", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>{r.categoryEmoji}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:"flex", alignItems:"center" }}>
                    <div style={{ width: "100px", display:"flex", alignItems:"center", gap:4 }}>
                      <span style={{ fontWeight:900, fontSize:16, color:"#1a1a1a", whiteSpace: "nowrap" }}>{r.categoryLabel}</span>
                      {r.subCategory && <span style={{ fontSize:12, color:"#9CA3AF", fontWeight:700, whiteSpace: "nowrap" }}>/ {r.subCategory}</span>}
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:2, whiteSpace: "nowrap", overflow: "hidden" }}>
                      <span style={{ fontSize:12, color:"#1a1a1a", letterSpacing: -2 }}>{(r.memberObjs || []).map(m => m.emoji).join("")}</span>
                      <span style={{ fontSize:11, color:"#9CA3AF", fontWeight:700, marginLeft: 4 }}>{String(r.member).replace(/,/g, "、")}</span>
                    </div>
                  </div>
                  <div style={{ fontSize:13, color:"#9CA3AF", marginTop:4, fontWeight:500 }}>
                    {/* 如果是在搜尋模式，額外顯示這是哪一天的紀錄，方便辨識 */}
                    {searchQuery.trim() && <span style={{color: "#F59E0B", fontWeight: 700, marginRight: 6}}>[{r.date.substring(5).replace('-','/')}]</span>}
                    {r.note || "無備註"}
                  </div>
                </div>
                <div style={{ fontWeight:900, fontSize:15, color:r.categoryColor||"#333", flexShrink:0 }}>{formatMoney(r.amount)}</div>
                
                {/* 🌟 三角形防誤觸按鈕區 */}
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, marginLeft: 4, flexShrink:0 }}>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => { setEditId(r.id); setEditAmt(r.amount); setEditNote(r.note ? r.note.replace(/^'/, '') : ""); setConfirmId(null); }} style={{ background:"none", border:"none", cursor:"pointer", fontSize:16, padding:2 }}>✏️</button>
                    <button onClick={() => { setConfirmId(confirmId === r.id ? null : r.id); setEditId(null); }} style={{ background:"none", border:"none", cursor:"pointer", fontSize:16, padding:2 }}>🗑</button>
                  </div>
                  <button onClick={() => onDuplicate(r)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:16, padding:2 }}>🔁</button>
                </div>

              </div>
              {confirmId === r.id && (<div style={{ marginTop:14, paddingTop: 12, borderTop: "1px dashed #E5E7EB", display:"flex", gap:10, justifyContent:"flex-end", animation:"slideUp 0.2s ease" }}><button onClick={() => setConfirmId(null)} style={{ padding:"6px 16px", borderRadius:99, border:"1px solid #E5E7EB", background:"#F3F4F6", color:"#4B5563", fontSize:13, fontWeight:700, cursor:"pointer" }}>取消</button><button onClick={() => { onDelete(r.id, r.date); setConfirmId(null); }} style={{ padding:"6px 16px", borderRadius:99, border:"none", background:"#EF4444", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>確認刪除</button></div>)}
              {editId === r.id && (<div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px dashed #E5E7EB", animation: "slideUp 0.2s ease" }}><div style={{ display: "flex", gap: 8, marginBottom: 10 }}><div style={{ position: "relative", width: "40%" }}><span style={{ position:"absolute", left:8, top:"50%", transform:"translateY(-50%)", color:"#9CA3AF", fontSize:14 }}>$</span><input type="text" inputMode="decimal" value={editAmt} onChange={e => setEditAmt(e.target.value)} style={{ width: "100%", padding: "8px 8px 8px 20px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 15, fontWeight:700, outline: "none", background:"#F9FAFB" }} /></div><input type="text" value={editNote} onChange={e => setEditNote(e.target.value)} placeholder="備註..." style={{ width: "60%", padding: "8px 10px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 13, outline: "none", background:"#F9FAFB" }} /></div><div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}><button onClick={() => setEditId(null)} style={{ padding: "6px 16px", borderRadius: 99, background: "#F3F4F6", border: "1px solid #E5E7EB", color: "#4B5563", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>取消</button><button onClick={() => { onUpdate(r, editAmt, editNote); setEditId(null); }} style={{ padding: "6px 16px", borderRadius: 99, background: "#10B981", border: "none", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>儲存</button></div></div>)}
            </div>
          ))
        }
      </div>
    </>
  );
}

function DashboardView({ records, loading, selYear, setSelYear, selMonth, setSelMonth }) {
  const categoryTotals = CATEGORIES.map(cat => ({ ...cat, total: records.filter(r => r.category === cat.id).reduce((s, r) => s + r.amount, 0) })).filter(c => c.total > 0).sort((a, b) => b.total - a.total);
  const totalSpend = records.reduce((s, r) => s + r.amount, 0);
  const RADIAN = Math.PI / 180;
  const renderLabel = ({ cx, cy, midAngle, innerRadius, outerRadius, percent }) => { if (percent < 0.05) return null; const r = innerRadius + (outerRadius - innerRadius) * 0.5; const x = cx + r * Math.cos(-midAngle * RADIAN); const y = cy + r * Math.sin(-midAngle * RADIAN); return <text x={x} y={y} fill="white" textAnchor="middle" dominantBaseline="central" fontSize={14} fontWeight={900}>{`${(percent*100).toFixed(0)}%`}</text>; };
  const prevMonth = () => { if (selMonth === 1) { setSelYear(y => y-1); setSelMonth(12); } else setSelMonth(m => m-1); };
  const nextMonth = () => { if (selMonth === 12) { setSelYear(y => y+1); setSelMonth(1); } else setSelMonth(m => m+1); };
  
  const [detailMember, setDetailMember] = useState(null);

  return (
    <>
      <Card><div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}><button onClick={prevMonth} style={{ width:44, height:44, borderRadius:99, border:"2px solid #F3F4F6", background:"#F9FAFB", fontSize:24, cursor:"pointer", fontWeight:900 }}>‹</button><div style={{ textAlign:"center" }}><div style={{ fontSize:24, fontWeight:900, color:"#1a1a1a" }}>{selYear}年{String(selMonth).padStart(2,"0")}月</div></div><button onClick={nextMonth} style={{ width:44, height:44, borderRadius:99, border:"2px solid #F3F4F6", background:"#F9FAFB", fontSize:24, cursor:"pointer", fontWeight:900 }}>›</button></div></Card>
      {loading ? <div style={{ textAlign:"center", padding:"50px 20px", color:"#9CA3AF" }}><div style={{ fontSize:36, marginBottom:16 }}>⏳</div><div style={{ fontSize:18, fontWeight:900 }}>載入資料中...</div></div> : records.length === 0 ? <div style={{ textAlign:"center", padding:"50px 20px", color:"#9CA3AF" }}><div style={{ fontSize:56, marginBottom:16 }}>📭</div><div style={{ fontSize:18, fontWeight:900, color:"#374151" }}>這個月沒有記錄</div></div> : (
        <>
          <Card style={{ background:"#1a1a1a" }}><div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}><div><div style={{ color:"#9CA3AF", fontSize:14, fontWeight:700 }}>當月支出</div><div style={{ color:"#F59E0B", fontSize:38, fontWeight:900, letterSpacing:-1, marginTop:4 }}>{formatMoney(totalSpend)}</div></div><div style={{ textAlign:"right" }}><div style={{ color:"#9CA3AF", fontSize:14, fontWeight:700 }}>筆數</div><div style={{ color:"#fff", fontSize:38, fontWeight:900, marginTop:4 }}>{records.length}</div></div></div></Card>
          <Card><SectionLabel>📊 支出類別比例</SectionLabel><ResponsiveContainer width="100%" height={280}><PieChart><Pie data={categoryTotals} dataKey="total" nameKey="label" cx="50%" cy="50%" outerRadius={110} labelLine={false} label={renderLabel}>{categoryTotals.map((cat, i) => <Cell key={i} fill={cat.color} />)}</Pie><Tooltip formatter={(v, n) => [formatMoney(v), n]} /><Legend formatter={(v) => <span style={{ fontSize:14, fontWeight:700 }}>{v}</span>} /></PieChart></ResponsiveContainer></Card>
          <Card><SectionLabel>🏆 類別排行榜</SectionLabel>{categoryTotals.map((cat) => (<div key={cat.id} style={{ marginBottom:18 }}><div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}><div style={{ width:32, height:32, borderRadius:10, background:cat.color+"22", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>{cat.emoji}</div><span style={{ flex:1, fontWeight:900, fontSize:17, color:"#1a1a1a" }}>{cat.label}</span><span style={{ fontWeight:900, fontSize:18, color:cat.color }}>{formatMoney(cat.total)}</span><span style={{ fontSize:14, color:"#9CA3AF", width:44, textAlign:"right", fontWeight:700 }}>{totalSpend > 0 ? ((cat.total/totalSpend)*100).toFixed(1) : 0}%</span></div><div style={{ height:8, background:"#F3F4F6", borderRadius:99, overflow:"hidden" }}><div style={{ height:"100%", background:cat.color, borderRadius:99, width:`${totalSpend > 0 ? (cat.total/totalSpend)*100 : 0}%`, transition:"width 0.5s ease" }} /></div></div>))}</Card>
          <Card>
            <SectionLabel>👥 成員支出 (點擊看明細)</SectionLabel>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:12 }}>
              {MEMBERS.map(m => {
                const total = records.reduce((sum, r) => {
                  const memStr = String(r.member || "");
                  if (!memStr) return sum;
                  const memList = memStr.split(/[、,]/).map(name => name.trim()).filter(n => n);
                  if (memList.includes(m.label)) {
                    return sum + Math.round(r.amount / memList.length);
                  }
                  return sum;
                }, 0);
                return (
                  <div key={m.id} onClick={() => setDetailMember(m)} style={{ background: total > 0 ? m.color+"12" : "#F9FAFB", border:`2px solid ${total > 0 ? m.color+"40" : "#F3F4F6"}`, borderRadius:16, padding:"18px 14px", textAlign:"center", cursor: "pointer", transition: "all 0.15s" }}>
                    {m.image ? (
                      <img src={m.image} style={{ width: 44, height: 44, borderRadius: "50%", objectFit: "cover", margin: "0 auto", marginBottom: 6, display: "block" }} alt={m.label} />
                    ) : (
                      <div style={{ fontSize:32 }}>{m.emoji}</div>
                    )}
                    <div style={{ fontWeight:900, fontSize:15, color:"#374151", marginTop:6 }}>{m.label}</div>
                    <div style={{ fontWeight:900, fontSize:20, color: total > 0 ? m.color : "#D1D5DB", marginTop:6 }}>{formatMoney(total)}</div>
                  </div>
                );
              })}
            </div>
          </Card>

          {/* 🌟 報表明細彈出視窗 */}
          {detailMember && (() => {
            let memberRecords = [];
            records.forEach(r => {
              const memStr = String(r.member || "");
              const memList = memStr.split(/[、,]/).map(name => name.trim()).filter(n => n);
              if (memList.includes(detailMember.label)) {
                memberRecords.push({ ...r, splitAmount: Math.round(r.amount / memList.length), splitCount: memList.length });
              }
            });
            memberRecords.sort((a, b) => b.splitAmount - a.splitAmount);

            return (
              <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0,0,0,0.6)', zIndex: 9999, display: 'flex', justifyContent: 'center', alignItems: 'flex-end', animation: 'fadeIn 0.2s ease' }} onClick={() => setDetailMember(null)}>
                <div style={{ background: '#F8F7F4', width: '100%', maxWidth: 480, maxHeight: '85vh', borderTopLeftRadius: 24, borderTopRightRadius: 24, display: 'flex', flexDirection: 'column', animation: 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)', paddingBottom: 20 }} onClick={e => e.stopPropagation()}>
                  <div style={{ padding: '20px 24px', background: '#fff', borderTopLeftRadius: 24, borderTopRightRadius: 24, display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: '1px solid #F3F4F6' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      {detailMember.image ? <img src={detailMember.image} style={{width:36, height:36, borderRadius:'50%', objectFit:'cover'}} /> : <div style={{fontSize:28}}>{detailMember.emoji}</div>}
                      <div style={{ fontSize: 18, fontWeight: 900, color: '#1a1a1a' }}>{detailMember.label} 的本月支出</div>
                    </div>
                    <button onClick={() => setDetailMember(null)} style={{ background: '#F3F4F6', border: 'none', width: 32, height: 32, borderRadius: '50%', fontSize: 16, cursor: 'pointer', color: '#6B7280', fontWeight: 900, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                  </div>
                  <div style={{ padding: '16px 20px', overflowY: 'auto', flex: 1 }}>
                    {memberRecords.length === 0 ? (
                       <div style={{ textAlign: 'center', color: '#9CA3AF', padding: '40px 0', fontWeight: 700 }}>這個月還沒有花費喔！</div>
                    ) : (
                      memberRecords.map(r => (
                        <div key={r.id} style={{ background: '#fff', borderRadius: 16, padding: '14px 16px', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 12, boxShadow: '0 2px 8px rgba(0,0,0,0.04)', borderLeft: `6px solid ${r.categoryColor}` }}>
                          <div style={{ width: 40, height: 40, borderRadius: 12, background: (r.categoryColor||'#ccc')+'22', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>
                            {r.categoryEmoji}
                          </div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                              <span style={{ fontWeight: 900, fontSize: 16, color: '#1a1a1a' }}>{r.categoryLabel}</span>
                              {/* 🌟 顯示平分成員的標籤 */}
                              {r.splitCount > 1 && <span style={{ fontSize: 10, background: '#FEF3C7', color: '#D97706', padding: '2px 6px', borderRadius: 4, fontWeight: 900, whiteSpace: "nowrap" }}>{String(r.member).replace(/,/g, "、")} 平分</span>}
                            </div>
                            <div style={{ fontSize: 12, color: '#9CA3AF', marginTop: 4, fontWeight: 700 }}>
                              {r.date.substring(5).replace('-','/')} {r.note ? ` • ${r.note.replace(/^'/, '')}` : ''}
                            </div>
                          </div>
                          <div style={{ fontWeight: 900, fontSize: 16, color: r.categoryColor||'#333' }}>{formatMoney(r.splitAmount)}</div>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>
            );
          })()}
        </>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
