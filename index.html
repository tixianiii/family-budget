<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>家庭記帳本</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="家庭記帳">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.4/lunar.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #F8F7F4; }
  ::-webkit-scrollbar { display: none; }
  @keyframes fadeIn { from { opacity:0; transform:translateX(-50%) translateY(-8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<div id="root">
  <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #1a1a1a; font-family: 'Noto Sans TC', sans-serif;">
    <div style="font-size: 72px; margin-bottom: 20px; animation: slideUp 0.5s ease;">📒</div>
    <div style="color: #F59E0B; font-size: 28px; font-weight: 900; letter-spacing: 4px; animation: fadeIn 0.8s ease;">家庭記帳本</div>
    <div style="color: #9CA3AF; font-size: 16px; font-weight: 700; margin-top: 16px; animation: fadeIn 1.2s ease;">正在載入資料，請稍候...</div>
  </div>
</div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { PieChart, Pie, Cell, Tooltip, ResponsiveContainer, Legend } = Recharts;

// 🔗 你的 Google API
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyv5ROh9LiMjcDsfdp4u1pmpxKgCX0O9yJL02Bv2XC-SzDNwxbTKjK4XRh9SIOIyAtk/exec";

const MEMBERS = [
  { id: "dad", label: "騏騏", emoji: "👨", color: "#3B82F6" },
  { id: "mom", label: "潔潔", emoji: "👩", color: "#EC4899" },
  { id: "sister", label: "嫻嫻", emoji: "👧", color: "#8B5CF6" },
  // 🌟 只有這裡改變：後面加上 image: "zeze.png"
  { id: "brother", label: "澤澤", emoji: "🧒", color: "#10B981", image: "zeze.png" }, 
  { id: "whole_family", label: "全家", emoji: "👨‍👩‍👧‍👦", color: "#F59E0B" },
];

const CATEGORIES = [
  { id: "food", label: "飲食", emoji: "🍱", color: "#F59E0B", subs: ["早餐","午餐","晚餐","飲料","點心","宵夜","酒","水果","保健品","其他"] },
  { id: "transport", label: "交通", emoji: "🚗", color: "#3B82F6", subs: ["公車","捷運","計程車","停車費","加油","高鐵","汽車","火車","摩托車"] },
  { id: "entertainment", label: "娛樂", emoji: "🎮", color: "#8B5CF6", subs: ["電影","遊戲","KTV","展覽","運動","訂閱","休閒","旅行","住宿","派對"] },
  { id: "company", label: "公司", emoji: "💼", color: "#6B7280", subs: [] },
  { id: "shopping", label: "購物", emoji: "🛍️", color: "#EC4899", subs: ["衣服","鞋子","包包","3C","書籍","生活用品","美妝保養","精品","禮物","網購","美容美髮"] },
  { id: "personal", label: "個人", emoji: "💆", color: "#06B6D4", subs: ["社交","通話費","投資","稅金","保險","捐款","彩券","卡費"] },
  { id: "medical", label: "醫療", emoji: "🏥", color: "#EF4444", subs: ["掛號費","藥費","醫療用品","打針","住院","手術","健康檢查"] },
  { id: "family", label: "居家", emoji: "🏠", color: "#F97316", subs: ["房租","網路費","電話費","日常用品","水費","電費","燃料費","洗衣費","修繕費","家具","家電","西螺家"] },
  { id: "education", label: "學習", emoji: "📚", color: "#10B981", subs: ["學費","補習班","課程","文具","書本"] },
  { id: "other", label: "其他", emoji: "📌", color: "#9CA3AF", subs: [] },
];

const getCatById = (label) => CATEGORIES.find(c => c.label === label) || CATEGORIES[CATEGORIES.length - 1];

const cleanDate = (str) => {
  if (!str) return "";
  const d = new Date(str);
  if (isNaN(d.getTime())) return String(str).split("T")[0];
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};

const today = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};

const formatDate = (str) => {
  const clean = cleanDate(str);
  const parts = clean.split("-");
  if (parts.length !== 3) return clean;
  return `${parts[0]}年${parts[1]}月${parts[2]}日`;
};

const formatMoney = (n) => `$${Number(n).toLocaleString()}`;

function Card({ children, style }) {
  return <div style={{ background:"#fff", borderRadius:16, padding:24, marginBottom:16, boxShadow:"0 1px 8px rgba(0,0,0,0.06)", ...style }}>{children}</div>;
}
function SectionLabel({ children }) {
  return <div style={{ fontSize:14, fontWeight:900, color:"#9CA3AF", letterSpacing:1.5, marginBottom:12 }}>{children}</div>;
}

function CalendarPicker({ date, setDate, records, selYear, selMonth, setSelYear, setSelMonth }) {
  const daysInMonth = new Date(selYear, selMonth, 0).getDate();
  const firstDay = new Date(selYear, selMonth - 1, 1).getDay();

  const dailyTotals = {};
  records.forEach(r => {
    const d = cleanDate(r.date);
    dailyTotals[d] = (dailyTotals[d] || 0) + r.amount;
  });

  const handlePrevMonth = () => {
    let newY = selYear, newM = selMonth - 1;
    if (newM === 0) { newY -= 1; newM = 12; }
    setSelYear(newY); setSelMonth(newM);
    setDate(`${newY}-${String(newM).padStart(2,'0')}-01`);
  };

  const handleNextMonth = () => {
    let newY = selYear, newM = selMonth + 1;
    if (newM === 13) { newY += 1; newM = 1; }
    setSelYear(newY); setSelMonth(newM);
    setDate(`${newY}-${String(newM).padStart(2,'0')}-01`);
  };

  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let i = 1; i <= daysInMonth; i++) days.push(i);
  const todayStr = today();

  return (
    <Card style={{ padding: "18px 16px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: 16 }}>
        <button onClick={handlePrevMonth} style={{ width:40, height:40, background:"#F9FAFB", border:"none", borderRadius:12, fontSize: 24, cursor:"pointer", color:"#374151", fontWeight:900 }}>‹</button>
        <div style={{ fontSize: 22, fontWeight: 900, color:"#1a1a1a", letterSpacing: 2 }}>{selYear}年{selMonth}月</div>
        <button onClick={handleNextMonth} style={{ width:40, height:40, background:"#F9FAFB", border:"none", borderRadius:12, fontSize: 24, cursor:"pointer", color:"#374151", fontWeight:900 }}>›</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", textAlign: "center", color: "#9CA3AF", fontSize: 14, fontWeight: 900, marginBottom: 12 }}>
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
        {days.map((day, idx) => {
          if (!day) return <div key={`empty-${idx}`} />;
          const currentCellDateStr = `${selYear}-${String(selMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const isSelected = date === currentCellDateStr;
          const isToday = todayStr === currentCellDateStr;
          const total = dailyTotals[currentCellDateStr] || 0;

          let lunarText = "";
          if (typeof Solar !== 'undefined') {
            try { lunarText = Solar.fromYmd(selYear, selMonth, day).getLunar().getDayInChinese(); } catch (e) {}
          }

          return (
            <div key={day} onClick={() => setDate(currentCellDateStr)}
              style={{
                height: 72, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", borderRadius: 14, cursor: "pointer",
                background: isSelected ? "#F59E0B" : total > 0 ? "#FEE2E2" : "transparent",
                color: isSelected ? "#fff" : "#1a1a1a", border: isToday && !isSelected ? "2px solid #F59E0B" : "2px solid transparent", transition: "all 0.15s"
              }}>
              <div style={{ fontSize: 18, fontWeight: 900, lineHeight: 1.1 }}>{isToday ? "今" : day}</div>
              {lunarText && <div style={{ fontSize: 11, fontWeight: 700, color: isSelected ? "rgba(255,255,255,0.9)" : "#9CA3AF", marginTop: 3 }}>{lunarText}</div>}
              {total > 0 && <div style={{ fontSize: 11, fontWeight: 900, color: isSelected ? "#FFFBEB" : "#EF4444", marginTop: 3 }}>-{total}</div>}
            </div>
          );
        })}
      </div>
    </Card>
  );
}

function App() {
  const [tab, setTab] = useState(0);
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  
  const [selYear, setSelYear] = useState(new Date().getFullYear());
  const [selMonth, setSelMonth] = useState(new Date().getMonth() + 1);

  const [date, setDate] = useState(today());
  const [member, setMember] = useState(null);
  const [category, setCategory] = useState(null);
  const [subCategory, setSubCategory] = useState(null);
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [toast, setToast] = useState(null);

  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);

  const fetchRecords = useCallback(async (year, month) => {
    const targetMonth = `${year}_${String(month).padStart(2, '0')}`;
    const cacheKey = `cache_${targetMonth}`;
    
    const cachedData = localStorage.getItem(cacheKey);
    if (cachedData) {
      try {
        const parsed = JSON.parse(cachedData);
        setRecords(parsed);
        setLoading(false);
      } catch(e) {}
    } else { setLoading(true); }

    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?month=${targetMonth}`);
      const data = await res.json();
      
      if (data.status === "ok") {
        const enriched = data.records.map(r => {
          const cat = getCatById(r.categoryLabel);
          const mem = MEMBERS.find(m => m.label === r.member) || MEMBERS[0];
          return { ...r, date: cleanDate(r.date), category: cat.id, categoryEmoji: cat.emoji, categoryColor: cat.color, member: mem };
        });
        enriched.sort((a,b) => new Date(b.date) - new Date(a.date));
        setRecords(enriched);
        localStorage.setItem(cacheKey, JSON.stringify(enriched));
      }
    } catch (err) {
      if (!cachedData) showToast(`連線失敗`, "error");
    } finally { setLoading(false); }
  }, [showToast]);

  useEffect(() => { fetchRecords(selYear, selMonth); }, [selYear, selMonth, fetchRecords]);
  useEffect(() => { if (date) { const [y, m] = date.split("-"); setSelYear(Number(y)); setSelMonth(Number(m)); } }, [date]);

  useEffect(() => {
    let startY = 0; let currentY = 0; let isAtTop = false;
    const handleTouchStart = (e) => { if (window.scrollY <= 0) { startY = e.touches[0].clientY; currentY = startY; isAtTop = true; } else { isAtTop = false; } };
    const handleTouchMove = (e) => { if (isAtTop) currentY = e.touches[0].clientY; };
    const handleTouchEnd = () => {
      if (isAtTop && (currentY - startY > 100)) { showToast("🔄 重新載入最新資料..."); setTimeout(() => window.location.reload(), 300); }
      startY = 0; currentY = 0; isAtTop = false;
    };
    window.addEventListener('touchstart', handleTouchStart, { passive: true });
    window.addEventListener('touchmove', handleTouchMove, { passive: true });
    window.addEventListener('touchend', handleTouchEnd, { passive: true });
    return () => { window.removeEventListener('touchstart', handleTouchStart); window.removeEventListener('touchmove', handleTouchMove); window.removeEventListener('touchend', handleTouchEnd); };
  }, [showToast]);

  const handleCategorySelect = (cat) => { setCategory(cat); setSubCategory(null); };

  const handleSubmit = async () => {
    if (!member || !category || !amount) return showToast("資料不完整哦", "error");
    let calculatedAmount = 0;
    try {
      const sanitized = String(amount).replace(/[^-()\d/*+.]/g, '');
      calculatedAmount = Function(`"use strict"; return (${sanitized})`)();
    } catch(e) { return showToast("算式格式錯誤", "error"); }

    if (!calculatedAmount || isNaN(calculatedAmount) || calculatedAmount <= 0) return showToast("請輸入有效金額", "error");

    showToast("⏳ 儲存中…");
    try {
      const params = new URLSearchParams({
        action: "write", id: String(Date.now()), date: date, member: member.label,
        categoryLabel: category.label, subCategory: subCategory || "",
        amount: String(calculatedAmount), note: note || "",
      });
      const res = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`);
      const result = await res.json();
      if (result.status === "ok") {
        showToast("✅ 記帳成功！");
        setMember(null); setCategory(null); setSubCategory(null); setAmount(""); setNote("");
        fetchRecords(selYear, selMonth);
      } else { showToast(`❌ 失敗`, "error"); }
    } catch (err) { showToast(`❌ 連線錯誤`, "error"); }
  };

  const handleDelete = async (id, recordDate) => {
    showToast("⏳ 刪除中…");
    try {
      const params = new URLSearchParams({ action: "delete", id: String(id), date: recordDate });
      const res = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`);
      const result = await res.json();
      if (result.status === "ok") { showToast("🗑 已刪除"); fetchRecords(selYear, selMonth); } 
      else { showToast(`❌ 刪除失敗`, "error"); }
    } catch(err) { showToast(`❌ 連線錯誤`, "error"); }
  };

  const handleUpdate = async (record, newAmount, newNote) => {
    let calculatedAmount = 0;
    try {
      const sanitized = String(newAmount).replace(/[^-()\d/*+.]/g, '');
      calculatedAmount = Function(`"use strict"; return (${sanitized})`)();
    } catch(e) { return showToast("算式格式錯誤", "error"); }

    if (!calculatedAmount || isNaN(calculatedAmount) || calculatedAmount <= 0) return showToast("請輸入有效金額", "error");

    showToast("⏳ 修改同步中…");
    try {
      const paramsDel = new URLSearchParams({ action: "delete", id: String(record.id), date: record.date });
      await fetch(`${APPS_SCRIPT_URL}?${paramsDel.toString()}`);
      
      const paramsAdd = new URLSearchParams({
        action: "write", id: String(record.id), date: record.date, member: record.member.label,
        categoryLabel: record.categoryLabel, subCategory: record.subCategory || "",
        amount: String(calculatedAmount), note: newNote || "",
      });
      const res = await fetch(`${APPS_SCRIPT_URL}?${paramsAdd.toString()}`);
      const result = await res.json();
      
      if (result.status === "ok") {
        showToast("✅ 修改成功！");
        fetchRecords(selYear, selMonth);
      } else { showToast(`❌ 修改失敗`, "error"); }
    } catch(err) { showToast(`❌ 連線錯誤`, "error"); }
  };

  const selectedDateTotal = records.filter(r => cleanDate(r.date) === date).reduce((s, r) => s + r.amount, 0);

  return (
    <div style={{ fontFamily:"'Noto Sans TC',sans-serif", minHeight:"100vh", background:"#F8F7F4" }}>
      {toast && (
        <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", background: toast.type === "error" ? "#EF4444" : "#1a1a1a", color:"#fff", padding:"12px 28px", borderRadius:99, zIndex:9999, fontSize:16, fontWeight:700, boxShadow:"0 4px 24px rgba(0,0,0,0.18)", animation:"fadeIn 0.2s ease", whiteSpace:"nowrap", maxWidth:"90vw" }}>
          {toast.msg}
        </div>
      )}

      <div style={{ background:"#1a1a1a", padding:"20px 20px 0", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ maxWidth:480, margin:"0 auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div>
                <div style={{ color:"#F59E0B", fontSize:13, fontWeight:700, letterSpacing:3, textTransform:"uppercase" }}>家庭共享</div>
                <div style={{ color:"#fff", fontSize:26, fontWeight:900, marginTop:2 }}>記帳本</div>
              </div>
              <button onClick={() => window.location.reload()} style={{ background:"none", border:"none", fontSize:24, cursor:"pointer", padding:5, opacity:0.8 }}>🔄</button>
              {tab === 0 && (
                <div style={{ marginLeft: 4, padding: "6px 12px", background: "#333", borderRadius: 12, border: "1px solid #444", animation: "fadeIn 0.3s ease" }}>
                  <div style={{ color: "#9CA3AF", fontSize: 12, fontWeight: 700, marginBottom: 2 }}>本日總計</div>
                  <div style={{ color: "#F59E0B", fontSize: 18, fontWeight: 900 }}>{formatMoney(selectedDateTotal)}</div>
                </div>
              )}
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ color:"#9CA3AF", fontSize:13, fontWeight:600 }}>{selMonth}月總計</div>
              <div style={{ color:"#F59E0B", fontSize:24, fontWeight:900 }}>{formatMoney(records.reduce((s, r) => s + r.amount, 0))}</div>
            </div>
          </div>
          <div style={{ display:"flex", gap:4 }}>
            {["記帳","報表"].map((t,i) => (
              <button key={t} onClick={() => setTab(i)} style={{ flex:1, padding:"12px 0", border:"none", background:"transparent", color: tab===i ? "#F59E0B" : "#6B7280", fontWeight:700, fontSize:18, cursor:"pointer", borderBottom:`4px solid ${tab===i ? "#F59E0B" : "transparent"}`, transition:"all 0.2s" }}>
                {t}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:480, margin:"0 auto", padding:"20px 16px 80px" }}>
        {tab === 0 ? (
          <FormView
            date={date} setDate={setDate} member={member} setMember={setMember}
            category={category} onCategorySelect={handleCategorySelect} subCategory={subCategory} setSubCategory={setSubCategory}
            amount={amount} setAmount={setAmount} note={note} setNote={setNote} onSubmit={handleSubmit} 
            selectedDateRecords={records.filter(r => cleanDate(r.date) === date)} 
            onDelete={handleDelete} onUpdate={handleUpdate} loading={loading}
            records={records} selYear={selYear} setSelYear={setSelYear} selMonth={selMonth} setSelMonth={setSelMonth}
          />
        ) : (
          <DashboardView records={records} loading={loading} selYear={selYear} setSelYear={setSelYear} selMonth={selMonth} setSelMonth={setSelMonth} />
        )}
      </div>
    </div>
  );
}

function FormView({ date, setDate, member, setMember, category, onCategorySelect, subCategory, setSubCategory, amount, setAmount, note, setNote, onSubmit, selectedDateRecords, onDelete, onUpdate, loading, records, selYear, setSelYear, selMonth, setSelMonth }) {
  const catObj = CATEGORIES.find(c => c.id === category?.id);
  const [confirmId, setConfirmId] = useState(null);
  const [editId, setEditId] = useState(null);
  const [editAmount, setEditAmount] = useState("");
  const [editNote, setEditNote] = useState("");

  const [showKeypad, setShowKeypad] = useState(false);
  const keypadRef = useRef(null);

  useEffect(() => {
    if (showKeypad && keypadRef.current) {
      setTimeout(() => { keypadRef.current.scrollIntoView({ behavior: "smooth", block: "end" }); }, 150);
    }
  }, [showKeypad]);

  return (
    <>
      <CalendarPicker date={date} setDate={setDate} records={records} selYear={selYear} setSelYear={setSelYear} selMonth={selMonth} setSelMonth={setSelMonth} />

      <Card>
        <SectionLabel>👤 成員</SectionLabel>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
          {MEMBERS.map(m => (
            <button key={m.id} onClick={() => setMember(m)} style={{ padding:"14px 4px", border:`2px solid ${member?.id===m.id ? m.color : "#F3F4F6"}`, borderRadius:14, background: member?.id===m.id ? m.color+"18" : "#F9FAFB", cursor:"pointer", textAlign:"center", transition:"all 0.15s" }}>
              <div style={{ fontSize:28 }}>{m.emoji}</div>
              <div style={{ fontSize:15, fontWeight:700, color: member?.id===m.id ? m.color : "#374151", marginTop:6 }}>{m.label}</div>
            </button>
          ))}
        </div>
      </Card>

      <Card>
        <SectionLabel>🗂 主類別</SectionLabel>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6 }}>
          {CATEGORIES.map(cat => (
            <button key={cat.id} onClick={() => onCategorySelect(cat)} style={{ padding:"12px 4px", border:`2px solid ${category?.id===cat.id ? cat.color : "#F3F4F6"}`, borderRadius:14, background: category?.id===cat.id ? cat.color+"18" : "#F9FAFB", cursor:"pointer", textAlign:"center", transition:"all 0.15s" }}>
              <div style={{ fontSize:26 }}>{cat.emoji}</div>
              <div style={{ fontSize:14, fontWeight:700, color: category?.id===cat.id ? cat.color : "#6B7280", marginTop:4 }}>{cat.label}</div>
            </button>
          ))}
        </div>
        {catObj && catObj.subs.length > 0 && (
          <div style={{ marginTop:16, animation:"slideUp 0.2s ease" }}>
            <SectionLabel>📎 子類別</SectionLabel>
            <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
              {catObj.subs.map(sub => (
                <button key={sub} onClick={() => setSubCategory(sub)} style={{ padding:"8px 16px", border:`2px solid ${subCategory===sub ? catObj.color : "#E5E7EB"}`, borderRadius:99, background: subCategory===sub ? catObj.color : "#fff", color: subCategory===sub ? "#fff" : "#374151", fontSize:15, fontWeight:700, transition:"all 0.15s" }}>{sub}</button>
              ))}
            </div>
          </div>
        )}
      </Card>

      <Card>
        <SectionLabel>💰 金額 (點擊開啟計算機)</SectionLabel>
        <div style={{ position:"relative" }}>
          <span style={{ position:"absolute", left:16, top:"50%", transform:"translateY(-50%)", fontSize:28, color:"#9CA3AF", fontWeight:900 }}>$</span>
          <input type="text" inputMode="none" readOnly value={amount} onClick={() => setShowKeypad(true)} placeholder="0" style={{ width:"100%", fontSize:42, fontWeight:900, border:"2px solid #F3F4F6", borderRadius:12, padding:"16px 16px 16px 48px", color: showKeypad ? "#F59E0B" : "#1a1a1a", background: showKeypad ? "#FFFBEB" : "#F9FAFB", outline:"none", cursor:"pointer", transition:"all 0.2s" }} />
        </div>

        {showKeypad && (
          <div ref={keypadRef} style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginTop: 18, animation: "slideUp 0.2s ease" }}>
            {[{ l: '7', v: '7' }, { l: '8', v: '8' }, { l: '9', v: '9' }, { l: '⌫', v: 'BACK', bg: '#FEE2E2', c: '#EF4444' },{ l: '4', v: '4' }, { l: '5', v: '5' }, { l: '6', v: '6' }, { l: '＋', v: '+', bg: '#FEF3C7', c: '#F59E0B' },{ l: '1', v: '1' }, { l: '2', v: '2' }, { l: '3', v: '3' }, { l: '－', v: '-', bg: '#FEF3C7', c: '#F59E0B' },{ l: 'C', v: 'CLEAR', bg: '#F3F4F6', c: '#6B7280' }, { l: '0', v: '0' }, { l: '×', v: '*', bg: '#FEF3C7', c: '#F59E0B' }, { l: '÷', v: '/', bg: '#FEF3C7', c: '#F59E0B' }].map(k => (
              <button key={k.l} type="button" onClick={(e) => { e.preventDefault(); if (k.v === 'BACK') setAmount(prev => String(prev).slice(0, -1)); else if (k.v === 'CLEAR') setAmount(""); else setAmount(prev => String(prev) + k.v); }} style={{ padding: "16px 0", fontSize: 26, fontWeight: 900, borderRadius: 14, border: "none", background: k.bg || '#fff', color: k.c || '#1a1a1a', boxShadow: "0 2px 6px rgba(0,0,0,0.06)", cursor: "pointer", fontFamily: "inherit" }}>
                {k.l}
              </button>
            ))}
            <button type="button" onClick={(e) => { e.preventDefault(); setShowKeypad(false); }} style={{ gridColumn: "span 4", padding: "16px 0", fontSize: 18, fontWeight: 900, borderRadius: 14, border: "none", background: '#1a1a1a', color: '#fff', boxShadow: "0 4px 12px rgba(0,0,0,0.15)", cursor: "pointer", fontFamily: "inherit", marginTop: 6, letterSpacing:2 }}>完成</button>
          </div>
        )}
        
        <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="備註（選填）⋯" rows={2} style={{ width:"100%", marginTop:16, fontSize:16, fontWeight:500, border:"2px solid #F3F4F6", borderRadius:12, padding:"14px 16px", color:"#374151", background:"#F9FAFB", outline:"none", resize:"none", lineHeight:1.6 }} />
        
        {(() => {
          if (!note.trim()) return null;
          const counts = {};
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith('cache_')) {
              try { JSON.parse(localStorage.getItem(key)).forEach(r => { if (r.note && r.note.trim()) { const n = r.note.trim(); counts[n] = (counts[n] || 0) + 1; } }); } catch(e) {}
            }
          }
          const suggestions = Object.keys(counts).filter(n => n.toLowerCase().includes(note.toLowerCase()) && n !== note).sort((a,b) => counts[b] - counts[a]).slice(0, 3);
          if (suggestions.length === 0) return null;
          return (
            <div style={{ display:"flex", gap:10, marginTop:12, flexWrap:"wrap", animation:"slideUp 0.2s ease" }}>
              <span style={{ fontSize:14, color:"#9CA3AF", display:"flex", alignItems:"center", fontWeight:700 }}>💡 猜你想輸入：</span>
              {suggestions.map(s => (
                <button key={s} onClick={() => setNote(s)} style={{ padding:"6px 14px", background:"#F3F4F6", color:"#374151", border:"1px solid #E5E7EB", borderRadius:99, fontSize:15, fontWeight:700, cursor:"pointer" }}>{s}</button>
              ))}
            </div>
          );
        })()}
      </Card>

      <button onClick={onSubmit} style={{ width:"100%", padding:"20px 0", background:"#1a1a1a", color:"#F59E0B", border:"none", borderRadius:16, fontSize:22, fontWeight:900, cursor:"pointer", letterSpacing:4, boxShadow:"0 4px 20px rgba(0,0,0,0.15)" }}>＋ 新增支出</button>

      {loading ? <div style={{ textAlign:"center", padding:"30px", color:"#9CA3AF", fontWeight:900, fontSize:18 }}>⏳ 同步資料中...</div> : 
        <div style={{ marginTop:30 }}>
          <SectionLabel>🕐 {formatDate(date)} 記錄</SectionLabel>
          {selectedDateRecords.length === 0 ? (
            <div style={{ textAlign:"center", padding:"30px", color:"#9CA3AF", fontWeight:700, fontSize:16, background:"#fff", borderRadius:16, border:"2px dashed #E5E7EB" }}>
              這天沒有花錢喔！🎉
            </div>
          ) : (
            selectedDateRecords.map(r => (
              <div key={r.id} style={{ background:"#fff", borderRadius:16, padding:"14px 16px", marginBottom:10, boxShadow:"0 2px 8px rgba(0,0,0,0.05)", borderLeft:`6px solid ${r.categoryColor}` }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <div style={{ width:40, height:40, borderRadius:12, background:(r.categoryColor||"#ccc")+"22", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>
                    {r.categoryEmoji}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    {/* 🌟 修改這裡：套用 100px 寬度限制、白名單 nowrap 防斷行 */}
                    <div style={{ display:"flex", alignItems:"center" }}>
                      <div style={{ width: "100px", display:"flex", alignItems:"center", gap:4 }}>
                        <span style={{ fontWeight:900, fontSize:16, color:"#1a1a1a", whiteSpace: "nowrap" }}>{r.categoryLabel}</span>
                        {r.subCategory && <span style={{ fontSize:12, color:"#9CA3AF", fontWeight:700, whiteSpace: "nowrap" }}>/ {r.subCategory}</span>}
                      </div>
                      <span style={{ fontSize:12, color:"#9CA3AF", fontWeight:700, whiteSpace: "nowrap" }}>{r.member?.emoji} {r.member?.label}</span>
                    </div>
                    <div style={{ fontSize:13, color:"#9CA3AF", marginTop:4, fontWeight:500 }}>{r.note || "無備註"}</div>
                  </div>
                  
                  {/* 🌟 金額字體從 17 縮小到 15 */}
                  <div style={{ fontWeight:900, fontSize:15, color:r.categoryColor||"#333", flexShrink:0 }}>{formatMoney(r.amount)}</div>
                  
                  {/* 🌟 按鈕區塊：間距縮小為 0、按鈕內距縮小為 2、字體縮為 14、靠攏 */}
                  <div style={{ display: "flex", gap: 0, marginLeft: 4, flexShrink:0 }}>
                    <button onClick={() => { setEditId(r.id); setEditAmount(r.amount); setEditNote(r.note || ""); setConfirmId(null); }} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14, padding:2 }}>✏️</button>
                    <button onClick={() => { setConfirmId(confirmId === r.id ? null : r.id); setEditId(null); }} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14, padding:2 }}>🗑</button>
                  </div>
                </div>

                {/* 刪除確認展開區 */}
                {confirmId === r.id && (
                  <div style={{ marginTop:14, paddingTop: 12, borderTop: "1px dashed #E5E7EB", display:"flex", gap:10, justifyContent:"flex-end", animation:"slideUp 0.2s ease" }}>
                    <button onClick={() => setConfirmId(null)} style={{ padding:"6px 16px", borderRadius:99, border:"1px solid #E5E7EB", background:"#F3F4F6", color:"#4B5563", fontSize:13, fontWeight:700, cursor:"pointer" }}>取消</button>
                    <button onClick={() => { onDelete(r.id, r.date); setConfirmId(null); }} style={{ padding:"6px 16px", borderRadius:99, border:"none", background:"#EF4444", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>確認刪除</button>
                  </div>
                )}

                {/* 內聯編輯展開區 */}
                {editId === r.id && (
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px dashed #E5E7EB", animation: "slideUp 0.2s ease" }}>
                    <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                      <div style={{ position: "relative", width: "40%" }}>
                        <span style={{ position:"absolute", left:8, top:"50%", transform:"translateY(-50%)", color:"#9CA3AF", fontSize:14 }}>$</span>
                        <input type="text" inputMode="decimal" value={editAmount} onChange={e => setEditAmount(e.target.value)} style={{ width: "100%", padding: "8px 8px 8px 20px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 15, fontWeight:700, outline: "none", background:"#F9FAFB" }} />
                      </div>
                      <input type="text" value={editNote} onChange={e => setEditNote(e.target.value)} placeholder="備註 (選填)..." style={{ width: "60%", padding: "8px 10px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 13, outline: "none", background:"#F9FAFB" }} />
                    </div>
                    <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
                      <button onClick={() => setEditId(null)} style={{ padding: "6px 16px", borderRadius: 99, background: "#F3F4F6", border: "1px solid #E5E7EB", color: "#4B5563", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>取消</button>
                      <button onClick={() => { onUpdate(r, editAmount, editNote); setEditId(null); }} style={{ padding: "6px 16px", borderRadius: 99, background: "#10B981", border: "none", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>儲存</button>
                    </div>
                  </div>
                )}
              </div>
            ))
          )}
        </div>
      }
    </>
  );
}

function DashboardView({ records, loading, selYear, setSelYear, selMonth, setSelMonth }) {
  const categoryTotals = CATEGORIES.map(cat => {
    const total = records.filter(r => r.category === cat.id).reduce((s, r) => s + r.amount, 0);
    return { ...cat, total };
  }).filter(c => c.total > 0).sort((a, b) => b.total - a.total);

  const totalSpend = records.reduce((s, r) => s + r.amount, 0);
  const RADIAN = Math.PI / 180;
  const renderLabel = ({ cx, cy, midAngle, innerRadius, outerRadius, percent }) => {
    if (percent < 0.05) return null;
    const r = innerRadius + (outerRadius - innerRadius) * 0.5;
    const x = cx + r * Math.cos(-midAngle * RADIAN);
    const y = cy + r * Math.sin(-midAngle * RADIAN);
    return <text x={x} y={y} fill="white" textAnchor="middle" dominantBaseline="central" fontSize={14} fontWeight={900}>{`${(percent*100).toFixed(0)}%`}</text>;
  };

  const prevMonth = () => { if (selMonth === 1) { setSelYear(y => y-1); setSelMonth(12); } else setSelMonth(m => m-1); };
  const nextMonth = () => { if (selMonth === 12) { setSelYear(y => y+1); setSelMonth(1); } else setSelMonth(m => m+1); };

  return (
    <>
      <Card>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <button onClick={prevMonth} style={{ width:44, height:44, borderRadius:99, border:"2px solid #F3F4F6", background:"#F9FAFB", fontSize:24, cursor:"pointer", fontWeight:900 }}>‹</button>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:24, fontWeight:900, color:"#1a1a1a" }}>{selYear}年{String(selMonth).padStart(2,"0")}月</div>
          </div>
          <button onClick={nextMonth} style={{ width:44, height:44, borderRadius:99, border:"2px solid #F3F4F6", background:"#F9FAFB", fontSize:24, cursor:"pointer", fontWeight:900 }}>›</button>
        </div>
      </Card>

      {loading ? (
        <div style={{ textAlign:"center", padding:"50px 20px", color:"#9CA3AF" }}>
          <div style={{ fontSize:36, marginBottom:16 }}>⏳</div>
          <div style={{ fontSize:18, fontWeight:900 }}>載入資料中...</div>
        </div>
      ) : records.length === 0 ? (
        <div style={{ textAlign:"center", padding:"50px 20px", color:"#9CA3AF" }}>
          <div style={{ fontSize:56, marginBottom:16 }}>📭</div>
          <div style={{ fontSize:18, fontWeight:900, color:"#374151" }}>這個月沒有記錄</div>
        </div>
      ) : (
        <>
          <Card style={{ background:"#1a1a1a" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ color:"#9CA3AF", fontSize:14, fontWeight:700 }}>當月支出</div>
                <div style={{ color:"#F59E0B", fontSize:38, fontWeight:900, letterSpacing:-1, marginTop:4 }}>{formatMoney(totalSpend)}</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ color:"#9CA3AF", fontSize:14, fontWeight:700 }}>筆數</div>
                <div style={{ color:"#fff", fontSize:38, fontWeight:900, marginTop:4 }}>{records.length}</div>
              </div>
            </div>
          </Card>
          <Card>
            <SectionLabel>📊 支出類別比例</SectionLabel>
            <ResponsiveContainer width="100%" height={280}>
              <PieChart>
                <Pie data={categoryTotals} dataKey="total" nameKey="label" cx="50%" cy="50%" outerRadius={110} labelLine={false} label={renderLabel}>
                  {categoryTotals.map((cat, i) => <Cell key={i} fill={cat.color} />)}
                </Pie>
                <Tooltip formatter={(v, n) => [formatMoney(v), n]} />
                <Legend formatter={(value) => <span style={{ fontSize:14, fontWeight:700 }}>{value}</span>} />
              </PieChart>
            </ResponsiveContainer>
          </Card>
          <Card>
            <SectionLabel>🏆 類別排行榜</SectionLabel>
            {categoryTotals.map((cat) => (
              <div key={cat.id} style={{ marginBottom:18 }}>
                <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
                  <div style={{ width:32, height:32, borderRadius:10, background:cat.color+"22", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>{cat.emoji}</div>
                  <span style={{ flex:1, fontWeight:900, fontSize:17, color:"#1a1a1a" }}>{cat.label}</span>
                  <span style={{ fontWeight:900, fontSize:18, color:cat.color }}>{formatMoney(cat.total)}</span>
                  <span style={{ fontSize:14, color:"#9CA3AF", width:44, textAlign:"right", fontWeight:700 }}>{totalSpend > 0 ? ((cat.total/totalSpend)*100).toFixed(1) : 0}%</span>
                </div>
                <div style={{ height:8, background:"#F3F4F6", borderRadius:99, overflow:"hidden" }}>
                  <div style={{ height:"100%", background:cat.color, borderRadius:99, width:`${totalSpend > 0 ? (cat.total/totalSpend)*100 : 0}%`, transition:"width 0.5s ease" }} />
                </div>
              </div>
            ))}
          </Card>
          <Card>
            <SectionLabel>👥 成員支出</SectionLabel>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:12 }}>
              {MEMBERS.map(m => {
                const total = records.filter(r => r.member?.id === m.id).reduce((s,r) => s+r.amount, 0);
                return (
                  <div key={m.id} style={{ background: total > 0 ? m.color+"12" : "#F9FAFB", border:`2px solid ${total > 0 ? m.color+"40" : "#F3F4F6"}`, borderRadius:16, padding:"18px 14px", textAlign:"center" }}>
                    <{/* 🌟 判斷：如果有圖片就顯示圖片，沒有就顯示原本的 Emoji */}
                     {m.image ? (
                       <img src={m.image} style={{ width: 44, height: 44, borderRadius: "50%", objectFit: "cover", margin: "0 auto", marginBottom: 6, display: "block" }} alt={m.label} />
                     ) : (
                       <div style={{ fontSize:32 }}>{m.emoji}</div>
                     )}
                    <div style={{ fontWeight:900, fontSize:15, color:"#374151", marginTop:6 }}>{m.label}</div>
                    <div style={{ fontWeight:900, fontSize:20, color: total > 0 ? m.color : "#D1D5DB", marginTop:6 }}>{formatMoney(total)}</div>
                  </div>
                );
              })}
            </div>
          </Card>
        </>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
