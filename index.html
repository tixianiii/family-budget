<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>家庭記帳本</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #F8F7F4; color: #1a1a1a; }
        ::-webkit-scrollbar { display: none; }
        
        /* 修正日期選擇器置中與美化 */
        .date-input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        input[type=date] { 
            width: 100%;
            text-align: center; 
            padding: 12px;
            border: 2px solid #F3F4F6;
            border-radius: 12/px;
            font-size: 18px;
            font-weight: 900;
            background: #F9FAFB;
            font-family: inherit;
            appearance: none;
            -webkit-appearance: none;
        }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

        @keyframes fadeIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { PieChart, Pie, Cell, Tooltip, ResponsiveContainer, Legend } = Recharts;

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyv5ROh9LiMjcDsfdp4u1pmpxKgCX0O9yJL02Bv2XC-SzDNwxbTKjK4XRh9SIOIyAtk/exec";

        const MEMBERS = [
            { id: "dad", label: "騏騏", emoji: "👨", color: "#3B82F6" },
            { id: "mom", label: "潔潔", emoji: "👩", color: "#EC4899" },
            { id: "sister", label: "嫻嫻", emoji: "👧", color: "#8B5CF6" },
            { id: "brother", label: "澤澤", emoji: "🧒", color: "#10B981" },
            { id: "whole_family", label: "全家", emoji: "👨‍👩‍👧‍👦", color: "#F59E0B" },
        ];

        const CATEGORIES = [
            { id: "food", label: "飲食", emoji: "🍱", color: "#F59E0B", subs: ["早餐","午餐","晚餐","飲料","點心","宵夜","其他"] },
            { id: "transport", label: "交通", emoji: "🚗", color: "#3B82F6", subs: ["公車","捷運","計程車","停車費","加油","高鐵","火車","摩托車"] },
            { id: "entertainment", label: "娛樂", emoji: "🎮", color: "#8B5CF6", subs: ["電影","遊戲","KTV","展覽","運動","旅行","住宿"] },
            { id: "company", label: "公司", emoji: "💼", color: "#6B7280", subs: [] },
            { id: "shopping", label: "購物", emoji: "🛍️", color: "#EC4899", subs: ["衣服","鞋子","包包","3C","書籍","生活用品","網購"] },
            { id: "personal", label: "個人", emoji: "💆", color: "#06B6D4", subs: ["通話費","投資","稅金","保險"] },
            { id: "medical", label: "醫療", emoji: "🏥", color: "#EF4444", subs: ["掛號費","藥費","健康檢查"] },
            { id: "family", label: "家居", emoji: "🏠", color: "#F97316", subs: ["房租","日常用品","水費","電費","家具"] },
            { id: "education", label: "學習", emoji: "📚", color: "#10B981", subs: ["學費","補習班","書本"] },
            { id: "other", label: "其他", emoji: "📌", color: "#9CA3AF", subs: [] },
        ];

        // 核心修正：移除 T16:00:00... 雜訊
        const cleanDate = (str) => {
            if (!str) return "";
            return String(str).split('T')[0];
        };

        const formatDate = (str) => {
            const dateStr = cleanDate(str);
            const parts = dateStr.split("-");
            if (parts.length !== 3) return dateStr;
            return `${parts[0]}年${parts[1]}月${parts[2]}日`;
        };

        const formatMoney = (n) => `$${Number(n).toLocaleString()}`;

        function Card({ children, style }) {
            return <div style={{ background:"#fff", borderRadius:20, padding:20, marginBottom:16, boxShadow:"0 4px 12px rgba(0,0,0,0.05)", ...style }}>{children}</div>;
        }

        function App() {
            const [tab, setTab] = useState(0);
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(true);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [member, setMember] = useState(null);
            const [category, setCategory] = useState(null);
            const [subCategory, setSubCategory] = useState(null);
            const [amount, setAmount] = useState("");
            const [note, setNote] = useState("");
            const [toast, setToast] = useState(null);

            const showToast = useCallback((msg, type = "success") => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            }, []);

            const fetchRecords = useCallback(async () => {
                setLoading(true);
                try {
                    const res = await fetch(APPS_SCRIPT_URL);
                    const data = await res.json();
                    if (data.status === "ok") {
                        const enriched = data.records.map(r => ({
                            ...r,
                            date: cleanDate(r.date),
                            memberObj: MEMBERS.find(m => m.label === r.member) || MEMBERS[0],
                            catObj: CATEGORIES.find(c => c.label === r.categoryLabel) || CATEGORIES[CATEGORIES.length-1]
                        }));
                        setRecords(enriched.reverse());
                    }
                } catch (err) {
                    showToast("讀取失敗", "error");
                } finally {
                    setLoading(false);
                }
            }, [showToast]);

            useEffect(() => { fetchRecords(); }, [fetchRecords]);

            const handleSubmit = async () => {
                if (!member || !category || !amount) return showToast("請完整填寫金額與成員哦！", "error");

                const newRecord = {
                    action: "write",
                    id: Date.now().toString(),
                    date,
                    member: member.label,
                    categoryLabel: category.label,
                    subCategory: subCategory || "",
                    amount: amount,
                    note: note
                };

                showToast("⏳ 正在儲存...");
                try {
                    const params = new URLSearchParams(newRecord);
                    const res = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`);
                    const result = await res.json();
                    if (result.status === "ok") {
                        showToast("✅ 記帳成功！");
                        setAmount(""); setNote(""); setSubCategory(null);
                        fetchRecords();
                    }
                } catch (e) { showToast("❌ 儲存失敗", "error"); }
            };

            const handleDelete = async (id) => {
                if (!confirm("確定要刪除這筆紀錄嗎？")) return;
                showToast("⏳ 正在刪除...");
                try {
                    const res = await fetch(`${APPS_SCRIPT_URL}?action=delete&id=${id}`);
                    const result = await res.json();
                    if (result.status === "ok") {
                        showToast("🗑 已從雲端刪除");
                        fetchRecords();
                    }
                } catch (e) { showToast("❌ 刪除失敗", "error"); }
            };

            return (
                <div style={{ minHeight:"100vh", paddingBottom:40 }}>
                    {toast && <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", background: toast.type==="error"?"#EF4444":"#1a1a1a", color:"#fff", padding:"12px 24px", borderRadius:50, zIndex:1000, boxShadow:"0 4px 15px rgba(0,0,0,0.2)", animation:"fadeIn 0.3s" }}>{toast.msg}</div>}
                    
                    <div style={{ background:"#1a1a1a", color:"#fff", padding:"24px 20px 10px", position:"sticky", top:0, zIndex:100 }}>
                        <div style={{ maxWidth:480, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                            <h1 style={{ fontSize:24, fontWeight:900 }}>家庭記帳本</h1>
                            <div style={{ textAlign:"right" }}>
                                <div style={{ fontSize:10, color:"#9CA3AF" }}>總支出</div>
                                <div style={{ fontSize:20, fontWeight:900, color:"#F59E0B" }}>{formatMoney(records.reduce((s,r)=>s+r.amount, 0))}</div>
                            </div>
                        </div>
                        <div style={{ display:"flex", maxWidth:480, margin:"15px auto 0", gap:10 }}>
                            <button onClick={()=>setTab(0)} style={{ flex:1, padding:"10px", background:"none", border:"none", color:tab===0?"#F59E0B":"#6B7280", borderBottom:tab===0?"3px solid #F59E0B":"none", fontWeight:700 }}>記帳</button>
                            <button onClick={()=>setTab(1)} style={{ flex:1, padding:"10px", background:"none", border:"none", color:tab===1?"#F59E0B":"#6B7280", borderBottom:tab===1?"3px solid #F59E0B":"none", fontWeight:700 }}>報表分析</button>
                        </div>
                    </div>

                    <div style={{ maxWidth:480, margin:"0 auto", padding:16 }}>
                        {tab === 0 ? (
                            <FormView 
                                date={date} setDate={setDate} member={member} setMember={setMember}
                                category={category} setCategory={setCategory} subCategory={subCategory} setSubCategory={setSubCategory}
                                amount={amount} setAmount={setAmount} note={note} setNote={setNote}
                                onSubmit={handleSubmit} records={records.slice(0,10)} onDelete={handleDelete} loading={loading}
                            />
                        ) : (
                            <DashboardView records={records} />
                        )}
                    </div>
                </div>
            );
        }

        function FormView({ date, setDate, member, setMember, category, setCategory, subCategory, setSubCategory, amount, setAmount, note, setNote, onSubmit, records, onDelete, loading }) {
            return (
                <div style={{ animation: "fadeIn 0.3s ease-out" }}>
                    <Card>
                        <div className="date-input-container">
                            <div style={{ fontSize:12, color:"#9CA3AF", marginBottom:8, fontWeight:700 }}>📅 日期選擇</div>
                            <input type="date" value={date} onChange={e=>setDate(e.target.value)} />
                            <div style={{ marginTop:8, fontSize:14, fontWeight:700, color:"#374151" }}>{formatDate(date)}</div>
                        </div>
                    </Card>

                    <Card>
                        <div style={{ fontSize:12, color:"#9CA3AF", marginBottom:12, fontWeight:700 }}>👤 選擇成員</div>
                        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
                            {MEMBERS.map(m => (
                                <button key={m.id} onClick={()=>setMember(m)} style={{ padding:"10px 0", borderRadius:12, border:member?.id===m.id?`2px solid ${m.color}`:"2px solid #F3F4F6", background:member?.id===m.id?m.color+"15":"#fff" }}>
                                    <div style={{ fontSize:20 }}>{m.emoji}</div>
                                    <div style={{ fontSize:11, fontWeight:700 }}>{m.label}</div>
                                </button>
                            ))}
                        </div>
                    </Card>

                    <Card>
                        <div style={{ fontSize:12, color:"#9CA3AF", marginBottom:12, fontWeight:700 }}>🗂 類別</div>
                        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
                            {CATEGORIES.map(cat => (
                                <button key={cat.id} onClick={()=>setCategory(cat)} style={{ padding:"10px 0", borderRadius:12, border:category?.id===cat.id?`2px solid ${cat.color}`:"2px solid #F3F4F6", background:category?.id===cat.id?cat.color+"15":"#fff" }}>
                                    <div style={{ fontSize:20 }}>{cat.emoji}</div>
                                    <div style={{ fontSize:11, fontWeight:700 }}>{cat.label}</div>
                                </button>
                            ))}
                        </div>
                        {category?.subs.length > 0 && (
                            <div style={{ marginTop:15, display:"flex", flexWrap:"wrap", gap:8 }}>
                                {category.subs.map(s => (
                                    <button key={s} onClick={()=>setSubCategory(s)} style={{ padding:"6px 12px", borderRadius:20, border:subCategory===s?`2px solid ${category.color}`:"1px solid #E5E7EB", fontSize:12, background:subCategory===s?category.color:"#fff", color:subCategory===s?"#fff":"#1a1a1a" }}>{s}</button>
                                ))}
                            </div>
                        )}
                    </Card>

                    <Card>
                        <div style={{ fontSize:12, color:"#9CA3AF", marginBottom:8, fontWeight:700 }}>💰 金額 & 備註</div>
                        <input type="number" placeholder="0" value={amount} onChange={e=>setAmount(e.target.value)} style={{ width:"100%", padding:15, border:"2px solid #F3F4F6", borderRadius:12, fontSize:28, fontWeight:900, marginBottom:10, textAlign:"center" }} />
                        <textarea placeholder="備註內容..." value={note} onChange={e=>setNote(e.target.value)} style={{ width:"100%", padding:12, border:"2px solid #F3F4F6", borderRadius:12, fontSize:14, minHeight:60, fontFamily:"inherit" }} />
                    </Card>

                    <button onClick={onSubmit} style={{ width:"100%", padding:18, background:"#1a1a1a", color:"#F59E0B", border:"none", borderRadius:20, fontSize:18, fontWeight:900, marginBottom:30 }}>＋ 新增支出</button>

                    <div style={{ fontSize:12, color:"#9CA3AF", marginBottom:12, fontWeight:700 }}>🕐 最近紀錄 (點擊刪除)</div>
                    {loading ? <div style={{ textAlign:"center", padding:20 }}>載入中...</div> : records.map(r => (
                        <div key={r.id} style={{ background:"#fff", borderRadius:16, padding:15, marginBottom:10, display:"flex", alignItems:"center", gap:12 }}>
                            <div style={{ width:45, height:45, borderRadius:12, background:r.catObj.color+"20", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>{r.catObj.emoji}</div>
                            <div style={{ flex:1 }}>
                                <div style={{ fontWeight:700, fontSize:15 }}>{r.categoryLabel} <span style={{ fontSize:12, color:"#9CA3AF", fontWeight:400 }}>{r.subCategory && `| ${r.subCategory}`}</span></div>
                                <div style={{ fontSize:11, color:"#9CA3AF" }}>{formatDate(r.date)} · {r.member} {r.note && ` · ${r.note}`}</div>
                            </div>
                            <div style={{ textAlign:"right" }}>
                                <div style={{ fontWeight:900, color:r.catObj.color }}>{formatMoney(r.amount)}</div>
                                <button onClick={()=>onDelete(r.id)} style={{ background:"none", border:"none", color:"#D1D5DB", fontSize:12, marginTop:4 }}>刪除</button>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function DashboardView({ records }) {
            const [selYear, setSelYear] = useState(new Date().getFullYear());
            const [selMonth, setSelMonth] = useState(new Date().getMonth() + 1);

            const filtered = records.filter(r => {
                const [y, m] = r.date.split("-");
                return Number(y) === selYear && Number(m) === selMonth;
            });

            const catStats = CATEGORIES.map(cat => {
                const total = filtered.filter(r => r.categoryLabel === cat.label).reduce((s,r)=>s+r.amount, 0);
                return { name: cat.label, value: total, color: cat.color };
            }).filter(c => c.value > 0).sort((a,b)=>b.value - a.value);

            const totalMonth = filtered.reduce((s,r)=>s+r.amount, 0);

            const nextMonth = () => { if(selMonth===12){ setSelYear(y=>y+1); setSelMonth(1); } else setSelMonth(m=>m+1); };
            const prevMonth = () => { if(selMonth===1){ setSelYear(y=>y-1); setSelMonth(12); } else setSelMonth(m=>m-1); };

            return (
                <div style={{ animation: "fadeIn 0.3s ease-out" }}>
                    <Card style={{ display:"flex", alignItems:"center", justifyContent:"space-between", textAlign:"center" }}>
                        <button onClick={prevMonth} style={{ background:"#F3F4F6", border:"none", padding:"10px 15px", borderRadius:12 }}>◀</button>
                        <div style={{ fontSize:20, fontWeight:900 }}>{selYear} 年 {selMonth} 月</div>
                        <button onClick={nextMonth} style={{ background:"#F3F4F6", border:"none", padding:"10px 15px", borderRadius:12 }}>▶</button>
                    </Card>

                    <Card style={{ background:"#1a1a1a", color:"#fff", textAlign:"center" }}>
                        <div style={{ color:"#9CA3AF", fontSize:13 }}>本月支出金額</div>
                        <div style={{ fontSize:36, fontWeight:900, color:"#F59E0B" }}>{formatMoney(totalMonth)}</div>
                        <div style={{ fontSize:12, marginTop:4 }}>共計 {filtered.length} 筆</div>
                    </Card>

                    {filtered.length > 0 ? (
                        <>
                            <Card>
                                <div style={{ fontSize:12, color:"#9CA3AF", marginBottom:15, fontWeight:700 }}>📊 類別佔比</div>
                                <ResponsiveContainer width="100%" height={250}>
                                    <PieChart>
                                        <Pie data={catStats} dataKey="value" cx="50%" cy="50%" innerRadius={60} outerRadius={80} paddingAngle={5}>
                                            {catStats.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.color} />)}
                                        </Pie>
                                        <Tooltip formatter={(v)=>[formatMoney(v), "金額"]} />
                                        <Legend />
                                    </PieChart>
                                </ResponsiveContainer>
                            </Card>
                            <Card>
                                <div style={{ fontSize:12, color:"#9CA3AF", marginBottom:15, fontWeight:700 }}>🏆 支出排行榜</div>
                                {catStats.map(c => (
                                    <div key={c.name} style={{ display:"flex", alignItems:"center", marginBottom:12, gap:10 }}>
                                        <div style={{ flex:1 }}>
                                            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                                                <span style={{ fontWeight:700, fontSize:14 }}>{c.name}</span>
                                                <span style={{ fontWeight:900 }}>{formatMoney(c.value)}</span>
                                            </div>
                                            <div style={{ height:6, background:"#F3F4F6", borderRadius:10 }}>
                                                <div style={{ height:"100%", background:c.color, borderRadius:10, width:`${(c.value/totalMonth*100)}%` }} />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </Card>
                        </>
                    ) : (
                        <div style={{ textAlign:"center", padding:50, color:"#9CA3AF" }}>這個月沒有紀錄哦 ☕️</div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
